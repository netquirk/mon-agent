name: Agent Release

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
          - goos: darwin
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#agent-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BIN_NAME="mon-agent"
          OUT_DIR="dist"
          mkdir -p "${OUT_DIR}"

          BIN_FILE="${BIN_NAME}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN_FILE="${BIN_NAME}.exe"
          fi

          GOOS="${{ matrix.goos }}" \
          GOARCH="${{ matrix.goarch }}" \
          CGO_ENABLED=0 \
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${OUT_DIR}/${BIN_FILE}" .

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BIN_NAME="mon-agent"
          DIST_DIR="dist"
          PACKAGE_BASENAME="${BIN_NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          PACKAGE_DIR="${DIST_DIR}/${PACKAGE_BASENAME}"
          mkdir -p "${PACKAGE_DIR}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            cp "${DIST_DIR}/${BIN_NAME}.exe" "${PACKAGE_DIR}/${BIN_NAME}.exe"
          else
            cp "${DIST_DIR}/${BIN_NAME}" "${PACKAGE_DIR}/${BIN_NAME}"
          fi
          cp README.md "${PACKAGE_DIR}/README.md"
          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          pushd "${DIST_DIR}" >/dev/null
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip -r "${PACKAGE_BASENAME}.zip" "${PACKAGE_BASENAME}" >/dev/null
            rm -rf "${PACKAGE_BASENAME}"
          else
            tar -czf "${PACKAGE_BASENAME}.tar.gz" "${PACKAGE_BASENAME}"
            rm -rf "${PACKAGE_BASENAME}"
          fi
          popd >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#agent-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
